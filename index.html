<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Central Pack Pedidos</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5e6d3;
}

/* HEADER */
.header {
  background: #8b0000;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* BUSCADOR */
.buscador {
  padding: 10px;
  background: #fff;
}

.buscador input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* PRODUCTOS */
#productos {
  padding: 10px;
}

.producto {
  background: white;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.nombre {
  font-weight: bold;
  margin-bottom: 5px;
}

.precio {
  color: #8b0000;
  font-size: 14px;
}

/* CONTROLES */
.control {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.control button {
  background: #8b0000;
  color: white;
  border: none;
  width: 35px;
  height: 35px;
  border-radius: 8px;
  font-size: 18px;
}

.control input {
  width: 50px;
  text-align: center;
  font-size: 16px;
}

/* BOTON */
.btn {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #b30000;
  color: white;
  padding: 15px;
  border: none;
  font-size: 18px;
}

/* CARRITO */
#carrito {
  padding: 10px;
  background: white;
  margin: 10px;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="header">
  CENTRAL PACK
</div>

<div class="buscador">
  <input type="text" placeholder="Buscar producto..." onkeyup="filtrar(this.value)">
</div>

<div id="productos"></div>

<div id="carrito">
  <b>Resumen:</b>
  <div id="detalle"></div>
  <div id="total"></div>
</div>

<button class="btn" onclick="enviarPedido()">Enviar Pedido</button>

<script>

let productos = [];
let productosFiltrados = [];

fetch("productos.json")
.then(res => res.json())
.then(data => {
  productos = data;
  productosFiltrados = data;
  render();
});

function render() {
  let cont = document.getElementById("productos");
  cont.innerHTML = "";

  productosFiltrados.forEach((p,i)=>{
    cont.innerHTML += `
      <div class="producto">
        <div class="nombre">${p.nombre}</div>
        ${p.pack > 0 ? `<div class="precio">📦 Pack x${p.packCant}: $${p.pack}</div>` : ""}
        ${p.unidad > 0 ? `<div class="precio">🧩 Unidad: $${p.unidad}</div>` : ""}

        <div class="control">
          <button onclick="cambiar(${i},-1)">-</button>
          <input type="number" id="p${i}" value="0">
          <button onclick="cambiar(${i},1)">+</button>
        </div>
      </div>
    `;
  });
}

function cambiar(i,v){
  let input = document.getElementById("p"+i);
  let val = parseInt(input.value)||0;
  val += v;
  if(val<0) val=0;
  input.value = val;
  calcular();
}

function calcular(){
  let total=0;
  let detalle="";

  productosFiltrados.forEach((p,i)=>{
    let c = parseInt(document.getElementById("p"+i)?.value)||0;

    if(c>0){
      let packs = Math.floor(c/p.packCant);
      let resto = c%p.packCant;

      let sub = (packs*p.pack)+(resto*p.unidad);
      total+=sub;

      detalle += `${p.nombre}: ${c} → $${sub}<br>`;
    }
  });

  document.getElementById("detalle").innerHTML=detalle;
  document.getElementById("total").innerText="Total: $"+total;
}

function enviarPedido(){
  let msg="Pedido:%0A";

  productosFiltrados.forEach((p,i)=>{
    let c=document.getElementById("p"+i)?.value;
    if(c>0){
      msg+=`- ${p.nombre}: ${c}%0A`;
    }
  });

  msg+="%0A"+document.getElementById("total").innerText;

  let tel="543865769832";
  window.open("https://wa.me/"+tel+"?text="+msg);
}

function filtrar(texto){
  productosFiltrados = productos.filter(p =>
    p.nombre.toLowerCase().includes(texto.toLowerCase())
  );
  render();
}

</script>

</body>
</html>
