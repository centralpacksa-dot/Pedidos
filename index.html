<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Pack</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* HEADER */
.header {
  background: #8b0000;
  color: white;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
}

/* BUSCADOR */
.buscador {
  padding: 10px;
  background: white;
  position: sticky;
  top: 0;
  z-index: 10;
}

.buscador input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
}

/* PRODUCTOS */
.producto {
  background: white;
  margin: 8px;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* INFO */
.nombre {
  font-size: 15px;
  font-weight: bold;
}

.precio {
  font-size: 13px;
  color: #8b0000;
}

/* CONTROL */
.control {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  margin-top: 10px;
}

.btn-cant {
  width: 45px;
  height: 45px;
  border: none;
  background: #8b0000;
  color: white;
  border-radius: 10px;
  font-size: 22px;
}

.input-cant {
  width: 60px;
  height: 45px;
  text-align: center;
  font-size: 18px;
  margin: 0 6px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* FOOTER TOTAL */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #ddd;
  padding: 10px;
}

.total {
  font-size: 16px;
  font-weight: bold;
}

.btn {
  width: 100%;
  background: #b30000;
  color: white;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  margin-top: 6px;
}
</style>

</head>

<body>

<div class="header">Central Pack</div>

<div class="buscador">
  <input type="text" placeholder="Buscar producto..." onkeyup="filtrar(this.value)">
</div>

<div id="productos"></div>

<div class="footer">
  <div class="total" id="total">Total: $0</div>
  <button class="btn" onclick="enviarPedido()">Enviar Pedido</button>
</div>

<script>

let productos = [];
let productosFiltrados = [];

fetch("productos.json")
.then(r => r.json())
.then(data => {
  productos = data;
  productosFiltrados = data;
  render();
});

function render(){
  let cont = document.getElementById("productos");
  cont.innerHTML = "";

  productosFiltrados.forEach((p,i)=>{
    cont.innerHTML += `
      <div class="producto">
        <div class="nombre">${p.nombre}</div>
        ${p.pack ? `<div class="precio">📦 Pack x${p.packCant}: $${p.pack}</div>` : ""}
        ${p.unidad ? `<div class="precio">Unidad: $${p.unidad}</div>` : ""}

        <div class="control">
          <button class="btn-cant" onclick="cambiar(${i},-1)">-</button>
          <input class="input-cant" id="p${i}" value="0" oninput="calcular()">
          <button class="btn-cant" onclick="cambiar(${i},1)">+</button>
        </div>
      </div>
    `;
  });
}

function cambiar(i,v){
  let input = document.getElementById("p"+i);
  let val = parseInt(input.value)||0;
  val += v;
  if(val<0) val=0;
  input.value = val;
  calcular();
}

function calcular(){
  let total = 0;

  productosFiltrados.forEach((p,i)=>{
    let c = parseInt(document.getElementById("p"+i)?.value)||0;

    if(c>0){
      let packs = Math.floor(c/p.packCant);
      let resto = c%p.packCant;
      total += (packs*p.pack)+(resto*p.unidad);
    }
  });

  document.getElementById("total").innerText = "Total: $" + total;
}

function enviarPedido(){
  let msg="Pedido:%0A";

  productosFiltrados.forEach((p,i)=>{
    let c=document.getElementById("p"+i)?.value;
    if(c>0){
      msg+=`- ${p.nombre}: ${c}%0A`;
    }
  });

  msg+="%0ATotal: "+document.getElementById("total").innerText;

  let tel="543865769832";
  window.open("https://wa.me/"+tel+"?text="+msg);
}

function filtrar(txt){
  productosFiltrados = productos.filter(p =>
    p.nombre.toLowerCase().includes(txt.toLowerCase())
  );
  render();
}

</script>

</body>
</html>
