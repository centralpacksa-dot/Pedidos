<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedidos Central Pack</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 10px;
}

h1 {
  text-align: center;
}

.producto {
  background: #fff;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nombre {
  font-weight: bold;
  font-size: 14px;
}

.precio {
  font-size: 13px;
  color: #444;
}

.cantidad {
  display: flex;
  align-items: center;
}

.cantidad button {
  width: 30px;
  height: 30px;
  border: none;
  background: black;
  color: white;
  border-radius: 5px;
}

.cantidad input {
  width: 40px;
  text-align: center;
  margin: 0 5px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  background: black;
  color: white;
  border-radius: 8px;
}

#carrito {
  background: #fff;
  padding: 15px;
  margin-top: 20px;
  border-radius: 10px;
}
</style>

</head>
<body>

<h1>Hacer Pedido</h1>

<div id="productos"></div>

<button onclick="calcularPedido()">Actualizar Pedido</button>

<div id="carrito">
  <h2>Resumen</h2>
  <div id="detalle"></div>
  <div id="total"></div>
  <button onclick="enviarPedido()">Enviar Pedido</button>
</div>

<script>

let productos = [];

fetch("productos.json")
  .then(res => res.json())
  .then(data => {
    productos = data;
    renderProductos();
  });

function renderProductos() {
  let cont = document.getElementById("productos");
  cont.innerHTML = "";

  productos.forEach((p, i) => {
    cont.innerHTML += `
      <div class="producto">
        <div class="info">
          <div class="nombre">${p.nombre}</div>
          ${p.pack > 0 ? `<div class="precio">📦 Pack x${p.packCant}: $${p.pack}</div>` : ""}
          ${p.unidad > 0 ? `<div class="precio">🧩 Unidad: $${p.unidad}</div>` : ""}
        </div>

        <div class="cantidad">
          <button onclick="cambiar(${i}, -1)">-</button>
          <input type="number" id="p${i}" value="0" min="0">
          <button onclick="cambiar(${i}, 1)">+</button>
        </div>
      </div>
    `;
  });
}

function cambiar(i, valor) {
  let input = document.getElementById("p" + i);
  let actual = parseInt(input.value) || 0;
  let nuevo = actual + valor;
  if (nuevo < 0) nuevo = 0;
  input.value = nuevo;
}

function calcularPedido() {
  let total = 0;
  let detalle = "";

  productos.forEach((p, i) => {
    let cantidad = parseInt(document.getElementById("p"+i).value) || 0;

    if (cantidad > 0) {
      let packs = Math.floor(cantidad / p.packCant);
      let resto = cantidad % p.packCant;

      let subtotal = (packs * p.pack) + (resto * p.unidad);

      total += subtotal;

      detalle += `${p.nombre}: ${cantidad} → $${subtotal.toFixed(2)}<br>`;
    }
  });

  document.getElementById("detalle").innerHTML = detalle;
  document.getElementById("total").innerText = "Total: $" + total.toFixed(2);
}

function enviarPedido() {
  let mensaje = "Pedido:%0A";

  productos.forEach((p, i) => {
    let cantidad = document.getElementById("p"+i).value;

    if (cantidad > 0) {
      mensaje += `- ${p.nombre}: ${cantidad}%0A`;
    }
  });

  mensaje += "%0A" + document.getElementById("total").innerText;

  let telefono = "5493865769832";
  let url = "https://wa.me/" + telefono + "?text=" + mensaje;

  window.open(url, "_blank");
}

</script>

</body>
</html>
