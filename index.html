<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Pack</title>

<style>
body{
margin:0;
font-family:Arial;
background:#e9d7b8; /* 🔥 beige más cálido */
overflow-x:hidden;
}
*{box-sizing:border-box}

/* HEADER */
.header{
position:fixed;
top:0;
width:100%;
background:#8b0000;
z-index:100;
box-shadow:0 4px 12px rgba(0,0,0,.25);
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
}

/* 🔥 LOGO PRO */
.logo{
font-size:24px;
font-weight:bold;
letter-spacing:1px;
text-shadow:
1px 1px 0 #fff,
-1px -1px 0 #fff,
1px -1px 0 #fff,
-1px 1px 0 #fff;
}

.logo span:first-child{
color:#b30000;
}

.logo span:last-child{
color:#111;
}

/* carrito */
.carrito-top{
background:white;
color:#8b0000;
padding:6px 12px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

/* banner */
.banner{
background:#b30000;
text-align:center;
padding:6px;
font-size:13px;
color:white;
font-weight:bold;
}

/* BUSCADOR */
.buscador{
margin-top:105px;
padding:10px;
}

.buscador input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
}

/* 🔥 CATEGORÍAS SCROLL */
.categorias{
display:flex;
gap:8px;
overflow-x:auto;
padding:10px;
}

.categorias::-webkit-scrollbar{display:none;}

.cat-btn{
background:white;
border:none;
padding:8px 14px;
border-radius:20px;
white-space:nowrap;
font-size:13px;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.cat-btn.active{
background:#8b0000;
color:white;
}

/* PRODUCTOS */
#productos{padding-bottom:160px;}

.producto{
background:white;
margin:10px;
border-radius:16px;
padding:14px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.nombre{font-weight:bold;}
.precio{color:#8b0000;font-size:13px;}

.control{
display:flex;
justify-content:flex-end;
margin-top:10px;
gap:6px;
}

.btn-cant{
width:42px;height:42px;
border:none;background:#8b0000;color:white;
border-radius:10px;
}

.input-cant{
width:55px;height:42px;
text-align:center;border-radius:10px;
border:1px solid #ddd;
}

/* CARRITO */
.backdrop{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
z-index:50;
}

.carrito-panel{
position:fixed;
bottom:0;left:0;right:0;
background:white;
max-height:85vh;
border-radius:20px 20px 0 0;
padding:15px;
overflow:auto;
transform:translateY(100%);
transition:.3s;
z-index:60;
}

.carrito-panel.active{transform:translateY(0);}

.carrito-item{
display:flex;
justify-content:space-between;
margin-bottom:12px;
position:relative;
border-bottom:1px solid #eee;
padding-bottom:8px;
}

.item-info{width:55%;font-size:13px;}

.item-control{
display:flex;
align-items:center;
gap:6px;
margin-right:25px;
}

.item-control button{
width:36px;height:36px;
background:#8b0000;color:white;
border:none;border-radius:6px;
}

.item-control input{
width:45px;height:36px;
text-align:center;border:1px solid #ddd;
border-radius:6px;
}

.close-x{
position:absolute;
right:0;
top:0;
cursor:pointer;
}

.btn{
width:100%;
background:#b30000;
color:white;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo">
      <span>CENTRAL</span> <span>PACK</span>
    </div>

    <div class="carrito-top" onclick="toggleCarrito()">
      🛒 <span id="count">0</span>
    </div>
  </div>

  <div class="banner" id="banner">COMPRÁ POR MAYOR Y MENOR</div>
</div>

<div class="buscador">
<input type="text" placeholder="Buscar..." onkeyup="filtrarTodo()">
</div>

<!-- 🔥 CATEGORÍAS -->
<div class="categorias">
<button class="cat-btn active" onclick="filtrarCategoria('')">Todos</button>
<button class="cat-btn" onclick="filtrarCategoria('Bolsas')">Bolsas</button>
<button class="cat-btn" onclick="filtrarCategoria('Bandejas')">Bandejas</button>
<button class="cat-btn" onclick="filtrarCategoria('Cajas')">Cajas</button>
<button class="cat-btn" onclick="filtrarCategoria('Insumos')">Insumos</button>
</div>

<div id="productos"></div>

<div class="backdrop" id="backdrop" onclick="toggleCarrito()"></div>

<div class="carrito-panel" id="panel">
<h3>Tu pedido</h3>
<div id="detalle"></div>
<div id="total"></div>
<div id="envio"></div>

<button class="btn" onclick="enviarPedido()">Enviar Pedido</button>
</div>

<script>
let productos=[];
let productosFiltrados=[];
let categoriaActual="";

fetch("productos.json")
.then(r=>r.json())
.then(data=>{
productos=data;
productosFiltrados=data;
actualizar();
});

/* 🔥 banner rotativo */
const mensajes=[
"COMPRÁ POR MAYOR Y MENOR",
"ENVÍO GRATIS CON COMPRA MÍNIMA",
"15% OFF COMPRANDO POR PACK"
];
let i=0;
setInterval(()=>{
i=(i+1)%mensajes.length;
document.getElementById("banner").innerText=mensajes[i];
},2500);

/* FILTRO CATEGORIA */
function filtrarCategoria(cat){
categoriaActual=cat;

document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

filtrarTodo();
}

/* FILTRO GENERAL */
function filtrarTodo(){
let texto=document.querySelector(".buscador input").value.toLowerCase();

productosFiltrados=productos.filter(p=>{
let okTexto=p.nombre.toLowerCase().includes(texto);
let okCat=!categoriaActual || p.categoria===categoriaActual;
return okTexto && okCat;
});

render();
}

/* resto de tu lógica queda igual */
</script>

</body>
</html>
