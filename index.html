<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Central Pack Pedidos</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
}

/* HEADER */
.header {
  background: linear-gradient(90deg, #8b0000, #b30000);
  color: white;
  padding: 12px;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
}

/* BUSCADOR */
.buscador {
  padding: 6px;
  background: white;
}

.buscador input {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* PRODUCTOS */
.producto {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  padding: 6px 8px;
  border-bottom: 1px solid #eee;
}

/* INFO */
.info {
  width: 65%;
}

.nombre {
  font-size: 13px;
  font-weight: bold;
}

.precio {
  font-size: 11px;
  color: #8b0000;
}

/* CONTROLES */
.control {
  display: flex;
  align-items: center;
  gap: 4px;
}

.btn-cant {
  width: 32px;
  height: 32px;
  border: none;
  background: #8b0000;
  color: white;
  border-radius: 6px;
  font-size: 16px;
}

.input-cant {
  width: 40px;
  height: 32px;
  text-align: center;
  border: 1px solid #ccc;
  border-radius: 6px;
}

/* CARRITO */
#carrito {
  background: white;
  padding: 8px;
  position: sticky;
  bottom: 60px;
  font-size: 13px;
}

/* BOTON */
.btn {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #b30000;
  color: white;
  padding: 12px;
  border: none;
  font-size: 16px;
}
</style>

</head>

<body>

<div class="header">
  CENTRAL PACK
</div>

<div class="buscador">
  <input type="text" placeholder="Buscar producto..." onkeyup="filtrar(this.value)">
</div>

<div id="productos"></div>

<div id="carrito">
  <b>Resumen:</b>
  <div id="detalle"></div>
  <div id="total"></div>
</div>

<button class="btn" onclick="enviarPedido()">Enviar Pedido</button>

<script>

let productos = [];
let productosFiltrados = [];

fetch("productos.json")
.then(res => res.json())
.then(data => {
  productos = data;
  productosFiltrados = data;
  render();
});

function render() {
  let cont = document.getElementById("productos");
  cont.innerHTML = "";

  productosFiltrados.forEach((p,i)=>{
    cont.innerHTML += `
      <div class="producto">
        <div class="info">
          <div class="nombre">${p.nombre}</div>
          ${p.pack > 0 ? `<div class="precio">Pack x${p.packCant}: $${p.pack}</div>` : ""}
          ${p.unidad > 0 ? `<div class="precio">Unidad: $${p.unidad}</div>` : ""}
        </div>

        <div class="control">
          <button class="btn-cant" onclick="cambiar(${i},-1)">-</button>
          <input class="input-cant" type="number" id="p${i}" value="0" oninput="calcular()">
          <button class="btn-cant" onclick="cambiar(${i},1)">+</button>
        </div>
      </div>
    `;
  });
}

function cambiar(i,v){
  let input = document.getElementById("p"+i);
  let val = parseInt(input.value)||0;
  val += v;
  if(val<0) val=0;
  input.value = val;
  calcular();
}

function calcular(){
  let total=0;
  let detalle="";

  productosFiltrados.forEach((p,i)=>{
    let c = parseInt(document.getElementById("p"+i)?.value)||0;

    if(c>0){
      let packs = Math.floor(c/p.packCant);
      let resto = c%p.packCant;

      let sub = (packs*p.pack)+(resto*p.unidad);
      total+=sub;

      detalle += `${p.nombre}: ${c} → $${sub.toFixed(0)}<br>`;
    }
  });

  document.getElementById("detalle").innerHTML=detalle;
  document.getElementById("total").innerText="Total: $"+total.toFixed(0);
}

function enviarPedido(){
  let msg="Pedido:%0A";

  productosFiltrados.forEach((p,i)=>{
    let c=document.getElementById("p"+i)?.value;
    if(c>0){
      msg+=`- ${p.nombre}: ${c}%0A`;
    }
  });

  msg+="%0A"+document.getElementById("total").innerText;

  let tel="543865769832";
  window.open("https://wa.me/"+tel+"?text="+msg);
}

function filtrar(texto){
  productosFiltrados = productos.filter(p =>
    p.nombre.toLowerCase().includes(texto.toLowerCase())
  );
  render();
}

</script>

</body>
</html>
