<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Pack</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5e6d3;
}

/* HEADER */
.header {
  background: #8b0000;
  color: white;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
}

/* BUSCADOR */
.buscador {
  padding: 10px;
}

.buscador input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* PRODUCTOS */
#productos {
  padding-bottom: 140px;
}

.producto {
  background: #ffffffcc;
  margin: 8px;
  border-radius: 12px;
  padding: 12px;
}

.nombre {
  font-weight: bold;
}

.precio {
  color: #8b0000;
  font-size: 13px;
}

/* CONTROL */
.control {
  display: flex;
  justify-content: flex-end;
  margin-top: 8px;
}

.btn-cant {
  width: 42px;
  height: 42px;
  border: none;
  background: #8b0000;
  color: white;
  border-radius: 10px;
  font-size: 20px;
}

.input-cant {
  width: 55px;
  height: 42px;
  text-align: center;
  margin: 0 5px;
  border-radius: 8px;
}

/* BOTON CARRITO */
.carrito-btn {
  position: fixed;
  bottom: 70px;
  right: 10px;
  background: #8b0000;
  color: white;
  padding: 12px 16px;
  border-radius: 25px;
  border: none;
}

/* PANEL */
.carrito-panel {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-height: 75%;
  background: white;
  border-radius: 20px 20px 0 0;
  padding: 15px;
  overflow-y: auto;
  display: none;
}

.carrito-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.item-info {
  width: 60%;
  font-size: 13px;
}

.item-control {
  display: flex;
  align-items: center;
}

.item-control button {
  width: 30px;
  height: 30px;
  background: #8b0000;
  color: white;
  border: none;
  border-radius: 6px;
}

.item-control input {
  width: 40px;
  text-align: center;
  margin: 0 4px;
}

.eliminar {
  color: red;
  font-size: 12px;
  cursor: pointer;
}

/* MENSAJE */
.envio {
  font-size: 13px;
  margin-top: 10px;
  color: #444;
}

/* BOTON FINAL */
.btn {
  width: 100%;
  background: #b30000;
  color: white;
  padding: 14px;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">Central Pack</div>

<div class="buscador">
  <input type="text" placeholder="Buscar..." onkeyup="filtrar(this.value)">
</div>

<div id="productos"></div>

<button class="carrito-btn" onclick="toggleCarrito()">
🛒 (<span id="count">0</span>)
</button>

<div class="carrito-panel" id="panel">
  <h3>Tu pedido</h3>
  <div id="detalle"></div>
  <div id="total"></div>
  <div class="envio" id="envio"></div>

  <button class="btn" onclick="guardarPedido()">Guardar pedido</button>
  <button class="btn" onclick="enviarPedido()">Enviar Pedido</button>
</div>

<script>

let productos = [];
let productosFiltrados = [];
let cantidades = JSON.parse(localStorage.getItem("pedido")) || {};

fetch("productos.json")
.then(r=>r.json())
.then(data=>{
  productos=data;
  productosFiltrados=data;
  actualizar();
});

function render(){
  let cont=document.getElementById("productos");
  cont.innerHTML="";

  productosFiltrados.forEach(p=>{
    let c=cantidades[p.nombre]||0;

    cont.innerHTML+=`
    <div class="producto">
      <div class="nombre">${p.nombre}</div>
      ${p.pack?`<div class="precio">Pack x${p.packCant}: $${p.pack}</div>`:""}
      ${p.unidad?`<div class="precio">Unidad: $${p.unidad}</div>`:""}

      <div class="control">
        <button class="btn-cant" onclick="cambiar('${p.nombre}',-1)">-</button>
        <input class="input-cant" value="${c}" oninput="setCantidad('${p.nombre}',this.value)">
        <button class="btn-cant" onclick="cambiar('${p.nombre}',1)">+</button>
      </div>
    </div>`;
  });
}

function cambiar(n,v){
  let c=cantidades[n]||0;
  c+=v;
  if(c<0)c=0;
  cantidades[n]=c;
  actualizar();
}

function setCantidad(n,val){
  let num=parseInt(val)||0;
  if(num<0)num=0;
  cantidades[n]=num;
  actualizar();
}

function eliminar(n){
  delete cantidades[n];
  actualizar();
}

function actualizar(){
  render();
  calcular();
  localStorage.setItem("pedido", JSON.stringify(cantidades));
}

function calcular(){
  let total=0;
  let detalle="";
  let count=0;

  productos.forEach(p=>{
    let c=cantidades[p.nombre]||0;

    if(c>0){
      count++;

      let packs=Math.floor(c/p.packCant);
      let resto=c%p.packCant;
      let sub=(packs*p.pack)+(resto*p.unidad);

      total+=sub;

      detalle+=`
      <div class="carrito-item">
        <div class="item-info">
          ${p.nombre}<br>
          x${c} → $${sub}
          <div class="eliminar" onclick="eliminar('${p.nombre}')">Eliminar</div>
        </div>

        <div class="item-control">
          <button onclick="cambiar('${p.nombre}',-1)">-</button>
          <input value="${c}" oninput="setCantidad('${p.nombre}',this.value)">
          <button onclick="cambiar('${p.nombre}',1)">+</button>
        </div>
      </div>`;
    }
  });

  document.getElementById("detalle").innerHTML=detalle;
  document.getElementById("total").innerText="Total: $"+total;
  document.getElementById("count").innerText=count;

  // mensaje envio
  if(total<12000){
    document.getElementById("envio").innerText =
    "🚚 Te faltan $" + (12000-total) + " para envío gratis";
  } else {
    document.getElementById("envio").innerText =
    "✅ Tenés envío gratis";
  }
}

function toggleCarrito(){
  let p=document.getElementById("panel");
  p.style.display=p.style.display==="block"?"none":"block";
}

function guardarPedido(){
  alert("Pedido guardado ✔️");
}

function enviarPedido(){
  let msg="Pedido:%0A";

  productos.forEach(p=>{
    let c=cantidades[p.nombre]||0;
    if(c>0){
      msg+=`- ${p.nombre}: ${c}%0A`;
    }
  });

  msg+="%0ATotal: "+document.getElementById("total").innerText;

  window.open("https://wa.me/543865769832?text="+msg);
}

function filtrar(txt){
  productosFiltrados=productos.filter(p=>
    p.nombre.toLowerCase().includes(txt.toLowerCase())
  );
  render();
}

</script>

</body>
</html>
