<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Pack</title>

<style>
body{
margin:0;
font-family:Arial;
background:#e8d3a5;
overflow-x:hidden;
}
*{box-sizing:border-box}

/* HEADER */
.header{
position:fixed;
top:0;
left:0;
width:100%;
background:#8b0000;
color:white;
z-index:100;
box-shadow:0 4px 12px rgba(0,0,0,.25);
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
}

.logo{
font-size:28px;
font-weight:900;
letter-spacing:2px;
color:#5a0000;
text-shadow:
1px 1px 0 #fff,
-1px -1px 0 #fff,
1px -1px 0 #fff,
-1px 1px 0 #fff,
2px 2px 3px rgba(0,0,0,.4);
}

.header-actions{
display:flex;
gap:8px;
}

.lupa{
background:white;
color:#8b0000;
padding:6px 10px;
border-radius:20px;
cursor:pointer;
}

.carrito-top{
background:white;
color:#8b0000;
padding:6px 12px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

.banner{
background:#b30000;
text-align:center;
padding:6px;
font-size:14px;
font-weight:bold;
}

/* BUSCADOR */
.buscador{
margin-top:110px;
padding:10px;
}

.buscador input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
}

/* FILTROS */
.filtros{
display:flex;
gap:6px;
padding:10px;
}

.filtros select{
padding:8px;
border-radius:10px;
border:none;
}

/* PRODUCTOS */
#productos{
padding-bottom:160px;
}

.producto{
background:white;
margin:10px;
border-radius:16px;
padding:14px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.nombre{font-weight:bold;}
.precio{color:#8b0000;font-size:13px;}

.control{
display:flex;
justify-content:flex-end;
margin-top:10px;
gap:6px;
}

.btn-cant{
width:42px;height:42px;
border:none;
background:#8b0000;
color:white;
border-radius:10px;
font-size:18px;
}

.input-cant{
width:55px;height:42px;
text-align:center;
border-radius:10px;
border:1px solid #ddd;
}

/* PANEL */
.backdrop{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
z-index:50;
}

.carrito-panel{
position:fixed;
bottom:0;
left:0;
right:0;
max-height:85vh;
background:white;
border-radius:20px 20px 0 0;
padding:15px;
overflow-y:auto;
transform:translateY(100%);
transition:.3s;
z-index:60;
}

.carrito-panel.active{
transform:translateY(0);
}

.carrito-item{
display:flex;
justify-content:space-between;
margin-bottom:12px;
position:relative;
border-bottom:1px solid #eee;
padding-bottom:8px;
}

.item-info{width:55%;font-size:13px;}

.item-control{
display:flex;
align-items:center;
gap:6px;
margin-right:25px;
}

.item-control button{
width:36px;height:36px;
font-size:18px;
background:#8b0000;
color:white;
border:none;
border-radius:6px;
}

.item-control input{
width:45px;height:36px;
text-align:center;
border:1px solid #ddd;
border-radius:6px;
}

.close-x{
position:absolute;
right:0;
top:0;
font-size:18px;
cursor:pointer;
}

.btn{
width:100%;
background:#b30000;
color:white;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <div class="logo">CENTRAL PACK</div>

    <div class="header-actions">
      <div class="lupa" onclick="focusBuscar()">🔍</div>
      <div class="carrito-top" onclick="toggleCarrito()">🛒 <span id="count">0</span></div>
    </div>
  </div>

  <div class="banner" id="bannerText">COMPRÁ POR MAYOR Y MENOR</div>
</div>

<div class="buscador">
<input id="inputBuscar" type="text" placeholder="Buscar..." onkeyup="filtrarTodo()">
</div>

<div class="filtros">
<select onchange="setCategoria(this.value)">
<option value="">Todas</option>
<option value="Varios">Varios</option>
<option value="Insumos">Insumos</option>
<option value="Envases">Envases</option>
<option value="Cajas">Cajas</option>
<option value="Bolsas">Bolsas</option>
<option value="Bandejas">Bandejas</option>
</select>

<select onchange="ordenarSelect(this.value)">
<option value="">Ordenar</option>
<option value="mayor">Mayor a menor</option>
<option value="menor">Menor a mayor</option>
</select>
</div>

<div id="productos"></div>

<div class="backdrop" id="backdrop" onclick="toggleCarrito()"></div>

<div class="carrito-panel" id="panel">
<h3>Tu pedido</h3>
<div id="detalle"></div>
<div id="total"></div>
<div id="envio"></div>
<button class="btn" onclick="enviarPedido()">Enviar Pedido</button>
</div>

<script>
let productos=[];
let productosFiltrados=[];
let cantidades=JSON.parse(localStorage.getItem("pedido"))||{};
let categoriaActiva="";
let ordenTipo="";

fetch("productos.json")
.then(r=>r.json())
.then(data=>{
productos=data;
productosFiltrados=data;
actualizar();
});

function focusBuscar(){
document.getElementById("inputBuscar").focus();
}

/* BANNER */
const mensajes=[
"COMPRÁ POR MAYOR Y MENOR",
"ENVÍO GRATIS CON COMPRA MÍNIMA",
"15% OFF COMPRANDO POR PACK"
];

let i=0;
setInterval(()=>{
i=(i+1)%mensajes.length;
document.getElementById("bannerText").innerText=mensajes[i];
},2500);

function money(n){ return Number(n).toFixed(2); }

function calcularItem(p,c){
let packCant=p.packCant||1;
let pack=p.pack||0;
let unidad=p.unidad||0;

if(pack>0){
let packs=Math.floor(c/packCant);
let resto=c%packCant;
return (packs*pack)+(resto*unidad);
}
return c*unidad;
}

/* RENDER */
function render(){
let cont=document.getElementById("productos");
cont.innerHTML="";

productosFiltrados.forEach(p=>{
let c=cantidades[p.nombre]||0;

cont.innerHTML+=`
<div class="producto">
<div class="nombre">${p.nombre}</div>
${p.pack?`<div class="precio">Pack (${p.packCant}): $${p.pack}</div>`:""}
${p.unidad?`<div class="precio">Unidad: $${p.unidad}</div>`:""}

<div class="control">
<button class="btn-cant" onclick="cambiar('${p.nombre}',-1)">-</button>
<input class="input-cant" value="${c}" oninput="setCantidad('${p.nombre}',this.value)">
<button class="btn-cant" onclick="cambiar('${p.nombre}',1)">+</button>
</div>
</div>`;
});
}

function cambiar(n,v){
let c=cantidades[n]||0;
c+=v;if(c<0)c=0;
cantidades[n]=c;
actualizar();
}

/* 🔥 FIX TECLADO */
function setCantidad(n,val){
let num=parseInt(val)||0;
if(num<0)num=0;

cantidades[n]=num;

/* SOLO recalcula sin reconstruir */
calcularSolo();

localStorage.setItem("pedido",JSON.stringify(cantidades));
}

/* 🔥 SOLO TOTALES */
function calcularSolo(){
let total=0;
let count=0;

productos.forEach(p=>{
let c=cantidades[p.nombre]||0;

if(c>0){
count++;
total+=calcularItem(p,c);
}
});

document.getElementById("total").innerText="Total: $"+money(total);
document.getElementById("count").innerText=count;

document.getElementById("envio").innerText =
total < 12000
? "🚚 Te faltan $" + money(12000-total)
: "✅ Envío gratis";
}

function actualizar(){
render();
calcular();
localStorage.setItem("pedido",JSON.stringify(cantidades));
}

function calcular(){
let total=0;
let count=0;
let detalle="";

productos.forEach(p=>{
let c=cantidades[p.nombre]||0;

if(c>0){
count++;
let sub=calcularItem(p,c);
total+=sub;

detalle+=`
<div class="carrito-item">
<div class="item-info">
${p.nombre}<br>x${c}<br>
<b>Subtotal: $${money(sub)}</b>
</div>

<div class="item-control">
<button onclick="cambiar('${p.nombre}',-1)">-</button>
<input value="${c}" oninput="setCantidad('${p.nombre}',this.value)">
<button onclick="cambiar('${p.nombre}',1)">+</button>
</div>

<div class="close-x" onclick="eliminar('${p.nombre}')">✖</div>
</div>`;
}
});

document.getElementById("detalle").innerHTML=detalle;
document.getElementById("total").innerText="Total: $"+money(total);
document.getElementById("count").innerText=count;

document.getElementById("envio").innerText =
total < 12000
? "🚚 Te faltan $" + money(12000-total)
: "✅ Envío gratis";
}

function eliminar(n){
delete cantidades[n];
actualizar();
}

function toggleCarrito(){
let p=document.getElementById("panel");
let bg=document.getElementById("backdrop");

p.classList.toggle("active");
bg.style.display=p.classList.contains("active")?"block":"none";

/* 🔥 recalcula completo solo al abrir */
if(p.classList.contains("active")){
calcular();
}
}

function enviarPedido(){
let msg="Pedido:%0A";

productos.forEach(p=>{
let c=cantidades[p.nombre]||0;
if(c>0){
msg+=`- [${p.codigo||"S/C"}] ${p.nombre}: ${c}%0A`;
}
});

let total=document.getElementById("total").innerText.replace("Total: ","");
msg+="%0ATotal: "+total;

window.open("https://wa.me/543865769832?text="+msg);
}

/* FILTROS */
function setCategoria(cat){
categoriaActiva=cat;
filtrarTodo();
}

function ordenarSelect(tipo){
ordenTipo=tipo;
filtrarTodo();
}

function filtrarTodo(){
let texto=document.getElementById("inputBuscar").value.toLowerCase();

let lista=productos.filter(p=>{
let okTexto=p.nombre.toLowerCase().includes(texto);
let okCat=!categoriaActiva || p.categoria===categoriaActiva;
return okTexto && okCat;
});

if(ordenTipo==="mayor"){
lista.sort((a,b)=>(b.unidad||b.pack)-(a.unidad||a.pack));
}
if(ordenTipo==="menor"){
lista.sort((a,b)=>(a.unidad||a.pack)-(b.unidad||b.pack));
}

productosFiltrados=lista;
render();
}
</script>

</body>
</html>
