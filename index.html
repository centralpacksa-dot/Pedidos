<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Pack</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5e6d3;
  overflow-x: hidden;
}

*{ box-sizing: border-box; }

.header {
  background: #8b0000;
  color: white;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
  position: sticky;
  top: 0;
  z-index: 10;
}

.buscador { padding: 10px; }

.buscador input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  outline: none;
}

#productos { padding-bottom: 160px; }

.producto {
  background: #fff;
  margin: 10px;
  border-radius: 16px;
  padding: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.nombre { font-weight: bold; }

.precio { color: #8b0000; font-size: 13px; }

.control {
  display: flex;
  justify-content: flex-end;
  margin-top: 10px;
  gap: 6px;
}

.btn-cant {
  width: 42px;
  height: 42px;
  border: none;
  background: #8b0000;
  color: white;
  border-radius: 10px;
  font-size: 18px;
}

.input-cant {
  width: 55px;
  height: 42px;
  text-align: center;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.carrito-btn {
  position: fixed;
  bottom: 20px;
  right: 15px;
  background: #8b0000;
  color: white;
  padding: 14px 18px;
  border-radius: 50px;
  border: none;
  font-size: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  z-index: 20;
}

.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 30;
}

.carrito-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100vw;
  max-height: 85vh;
  background: white;
  border-radius: 20px 20px 0 0;
  padding: 15px;
  overflow-y: auto;
  transform: translateY(100%);
  transition: 0.3s ease;
  z-index: 40;
}

.carrito-panel.active { transform: translateY(0); }

.carrito-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  position: sticky;
  top: 0;
  background: white;
  padding: 10px 0;
}

.carrito-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  border-bottom: 1px solid #eee;
  padding-bottom: 8px;
}

.item-info {
  font-size: 13px;
  width: 60%;
}

.item-control {
  display: flex;
  align-items: center;
  gap: 4px;
}

.item-control button {
  width: 28px;
  height: 28px;
  background: #8b0000;
  color: white;
  border: none;
  border-radius: 6px;
}

.item-control input {
  width: 40px;
  text-align: center;
  border: 1px solid #ddd;
  border-radius: 6px;
}

.eliminar-btn {
  background: red;
  color: white;
  border: none;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  margin-top: 4px;
}

.envio { font-size: 13px; margin-top: 10px; }

.btn {
  width: 100%;
  background: #b30000;
  color: white;
  padding: 14px;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">Central Pack</div>

<div class="buscador">
  <input type="text" placeholder="Buscar..." onkeyup="filtrar(this.value)">
</div>

<div id="productos"></div>

<button class="carrito-btn" onclick="toggleCarrito()">🛒 <span id="count">0</span></button>

<div class="backdrop" id="backdrop" onclick="toggleCarrito()"></div>

<div class="carrito-panel" id="panel">
  <div class="carrito-head">
    <h3>Tu pedido</h3>
    <button onclick="toggleCarrito()">✖</button>
  </div>

  <div id="detalle"></div>
  <div id="total"></div>
  <div class="envio" id="envio"></div>

  <button class="btn" onclick="guardarPedido()">Guardar pedido</button>
  <button class="btn" onclick="enviarPedido()">Enviar Pedido</button>
</div>

<script>
let productos=[];
let cantidades=JSON.parse(localStorage.getItem("pedido"))||{};

fetch("productos.json")
.then(r=>r.json())
.then(data=>{
  productos=data;
  actualizar();
});

function render(){
  let cont=document.getElementById("productos");
  cont.innerHTML="";

  productos.forEach(p=>{
    let c=cantidades[p.nombre]||0;

    cont.innerHTML+=`
    <div class="producto">
      <div class="nombre">${p.nombre}</div>
      ${p.pack?`<div class="precio">Pack (${p.packCant}): $${p.pack}</div>`:""}
      ${p.unidad?`<div class="precio">Unidad: $${p.unidad}</div>`:""}

      <div class="control">
        <button class="btn-cant" onclick="cambiar('${p.nombre}',-1)">-</button>
        <input class="input-cant" value="${c}" oninput="setCantidad('${p.nombre}',this.value)">
        <button class="btn-cant" onclick="cambiar('${p.nombre}',1)">+</button>
      </div>
    </div>`;
  });
}

function cambiar(n,v){
  let c=cantidades[n]||0;
  c+=v;
  if(c<0)c=0;
  cantidades[n]=c;
  actualizar();
}

function setCantidad(n,val){
  let num=parseInt(val)||0;
  if(num<0)num=0;
  cantidades[n]=num;
  calcularSolo();
  localStorage.setItem("pedido",JSON.stringify(cantidades));
}

function eliminar(n){
  delete cantidades[n];
  actualizar();
}

function actualizar(){
  render();
  calcularFull();
  localStorage.setItem("pedido",JSON.stringify(cantidades));
}

// COUNT FIX (productos distintos)
function calcularSolo(){
  let total=0;
  let count=Object.keys(cantidades).filter(k=>cantidades[k]>0).length;

  productos.forEach(p=>{
    let c=cantidades[p.nombre]||0;
    if(c>0){
      total+=c*(p.unidad||0);
    }
  });

  document.getElementById("total").innerText="Total: $"+total;
  document.getElementById("count").innerText=count;

  document.getElementById("envio").innerText =
    total<12000
    ? "🚚 Te faltan $"+(12000-total)+" para envío gratis"
    : "✅ Envío gratis";
}

function calcularFull(){
  calcularSolo();

  let detalle="";

  productos.forEach(p=>{
    let c=cantidades[p.nombre]||0;
    if(c>0){
      let sub=c*(p.unidad||0);

      detalle+=`
      <div class="carrito-item">
        <div class="item-info">
          ${p.nombre}<br>x${c} - $${sub}
          <div class="eliminar-btn" onclick="eliminar('${p.nombre}')">Eliminar</div>
        </div>
        <div class="item-control">
          <button onclick="cambiar('${p.nombre}',-1)">-</button>
          <input value="${c}" oninput="setCantidad('${p.nombre}',this.value)">
          <button onclick="cambiar('${p.nombre}',1)">+</button>
        </div>
      </div>`;
    }
  });

  document.getElementById("detalle").innerHTML=detalle;
}

function toggleCarrito(){
  let panel=document.getElementById("panel");
  let bg=document.getElementById("backdrop");

  let open=panel.classList.contains("active");

  if(open){
    panel.classList.remove("active");
    bg.style.display="none";
  }else{
    panel.classList.add("active");
    bg.style.display="block";
    calcularFull();
  }
}

function guardarPedido(){
  alert("Pedido guardado ✔️");
}

// WHATSAPP FIX
function enviarPedido(){
  let msg="Pedido:%0A";

  productos.forEach(p=>{
    let c=cantidades[p.nombre]||0;
    if(c>0){
      msg+=`- ${p.nombre}: ${c}%0A`;
    }
  });

  let totalTexto=document.getElementById("total").innerText.replace("Total: ","");
  msg+="%0ATotal: "+totalTexto;

  window.open("https://wa.me/543865769832?text="+msg);
}

function filtrar(t){
  productosFiltrados=productos.filter(p=>p.nombre.toLowerCase().includes(t.toLowerCase()));
  render();
}
</script>

</body>
</html>
