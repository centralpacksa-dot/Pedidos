<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Pack</title>

<style>
body { margin:0; font-family:Arial; background:#f5e6d3; overflow-x:hidden;}
*{box-sizing:border-box;}

.header {background:#8b0000;color:white;padding:14px;font-size:18px;font-weight:bold;position:sticky;top:0;}

.buscador{padding:10px;}
.buscador input{width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;}

.filtros{padding:10px;display:flex;gap:6px;flex-wrap:wrap;}

#productos{padding-bottom:160px;}

.producto{background:#fff;margin:10px;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.nombre{font-weight:bold;}
.precio{color:#8b0000;font-size:13px;}

.control{display:flex;justify-content:flex-end;margin-top:10px;gap:6px;}
.btn-cant{width:42px;height:42px;border:none;background:#8b0000;color:white;border-radius:10px;}
.input-cant{width:55px;height:42px;text-align:center;border-radius:10px;border:1px solid #ddd;}

.carrito-btn{position:fixed;bottom:20px;right:15px;background:#8b0000;color:white;padding:14px;border-radius:50px;border:none;}

.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;}

.carrito-panel{
position:fixed;bottom:0;left:0;right:0;width:100vw;max-height:85vh;background:white;
border-radius:20px 20px 0 0;padding:15px;overflow-y:auto;
transform:translateY(100%);transition:.3s;
}

.carrito-panel.active{transform:translateY(0);}

.carrito-item{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:12px;
position:relative;
border-bottom:1px solid #eee;
padding-bottom:8px;
}

.item-info{width:55%;font-size:13px;}

.item-control{
display:flex;
align-items:center;
gap:6px;
margin-right:25px;
}

.item-control button{
width:36px;height:36px;font-size:18px;
background:#8b0000;color:white;border:none;border-radius:6px;
}

.item-control input{
width:45px;height:36px;text-align:center;
border:1px solid #ddd;border-radius:6px;
}

.close-x{
position:absolute;
right:0;
top:0;
font-size:18px;
cursor:pointer;
}

.btn{
width:100%;
background:#b30000;
color:white;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">Central Pack</div>

<div class="buscador">
<input type="text" placeholder="Buscar..." onkeyup="filtrarTodo()">
</div>

<div class="filtros">
<select id="filtroCat" onchange="filtrarTodo()">
<option value="">Categoría</option>
<option value="Varios">Varios</option>
<option value="Insumos">Insumos</option>
<option value="Envases">Envases</option>
<option value="Cajas">Cajas</option>
<option value="Bolsas">Bolsas</option>
<option value="Bandejas">Bandejas</option>
</select>

<select id="filtroPrecio" onchange="filtrarTodo()">
<option value="">Precio</option>
<option value="menor">Menor a mayor</option>
<option value="mayor">Mayor a menor</option>
</select>
</div>

<div id="productos"></div>

<button class="carrito-btn" onclick="toggleCarrito()">🛒 <span id="count">0</span></button>

<div class="backdrop" id="backdrop" onclick="toggleCarrito()"></div>

<div class="carrito-panel" id="panel">
<h3>Tu pedido</h3>
<div id="detalle"></div>
<div id="total"></div>
<div id="envio"></div>

<button class="btn" onclick="enviarPedido()">Enviar Pedido</button>
</div>

<script>
let productos=[];
let productosFiltrados=[];
let cantidades=JSON.parse(localStorage.getItem("pedido"))||{};

fetch("productos.json")
.then(r=>r.json())
.then(data=>{
productos=data;
productosFiltrados=data;
actualizar();
});

/* 🔥 CALCULO ARREGLADO */
function calcularItem(p,c){
let packCant = p.packCant || 1;
let pack = p.pack || 0;
let unidad = p.unidad || 0;

if(pack === 0){
return c * unidad;
}

let packs = Math.floor(c / packCant);
let resto = c % packCant;

return (packs * pack) + (resto * unidad);
}

function render(){
let cont=document.getElementById("productos");
cont.innerHTML="";

productosFiltrados.forEach(p=>{
let c=cantidades[p.nombre]||0;

cont.innerHTML+=`
<div class="producto">
<div class="nombre">${p.nombre}</div>

${p.pack>0 
? `<div class="precio">Pack (${p.packCant}): $${p.pack}</div>` 
: `<div class="precio">Precio: $${p.unidad}</div>`}

<div class="control">
<button class="btn-cant" onclick="cambiar('${p.nombre}',-1)">-</button>
<input class="input-cant" value="${c}" oninput="setCantidad('${p.nombre}',this.value)">
<button class="btn-cant" onclick="cambiar('${p.nombre}',1)">+</button>
</div>
</div>`;
});
}

function cambiar(n,v){
let c=cantidades[n]||0;
c+=v;if(c<0)c=0;
cantidades[n]=c;
actualizar();
}

function setCantidad(n,val){
let num=parseInt(val)||0;
if(num<0)num=0;

cantidades[n]=num;

calcularSolo();
localStorage.setItem("pedido",JSON.stringify(cantidades));
}

function actualizar(){
render();
calcular();
localStorage.setItem("pedido",JSON.stringify(cantidades));
}

function calcularSolo(){
let total=0;
let count=0;

productos.forEach(p=>{
let c=cantidades[p.nombre]||0;

if(c>0){
count++;
total+=calcularItem(p,c);
}
});

document.getElementById("total").innerText="Total: $"+total;
document.getElementById("count").innerText=count;

document.getElementById("envio").innerText =
total < 12000
? "🚚 Te faltan $" + (12000 - total)
: "✅ Tenés envío gratis";
}

function calcular(){
let total=0;
let count=0;
let detalle="";

productos.forEach(p=>{
let c=cantidades[p.nombre]||0;

if(c>0){
count++;

let sub = calcularItem(p,c);
total += sub;

detalle+=`
<div class="carrito-item">

<div class="item-info">
${p.nombre}<br>
x${c}<br>
<b>Subtotal: $${sub}</b>
</div>

<div class="item-control">
<button onclick="cambiar('${p.nombre}',-1)">-</button>
<input value="${c}" oninput="setCantidad('${p.nombre}',this.value)">
<button onclick="cambiar('${p.nombre}',1)">+</button>
</div>

<div class="close-x" onclick="eliminar('${p.nombre}')">✖</div>

</div>`;
}
});

document.getElementById("detalle").innerHTML=detalle;
document.getElementById("total").innerText="Total: $"+total;
document.getElementById("count").innerText=count;

document.getElementById("envio").innerText =
total < 12000
? "🚚 Te faltan $" + (12000 - total)
: "✅ Tenés envío gratis";
}

function eliminar(n){
delete cantidades[n];
actualizar();
}

function toggleCarrito(){
let p=document.getElementById("panel");
let bg=document.getElementById("backdrop");

p.classList.toggle("active");
bg.style.display=p.classList.contains("active")?"block":"none";
}

function enviarPedido(){
let msg="Pedido:%0A";

productos.forEach(p=>{
let c=cantidades[p.nombre]||0;
if(c>0){
msg+=`- [${p.codigo||"S/C"}] ${p.nombre}: ${c}%0A`;
}
});

let total=document.getElementById("total").innerText.replace("Total: ","");
msg+="%0ATotal: "+total;

window.open("https://wa.me/543865769832?text="+msg);
}

/* 🔥 FILTRO CORREGIDO */
function filtrarTodo(){
let texto=document.querySelector(".buscador input").value.toLowerCase();
let cat=document.getElementById("filtroCat").value;
let precio=document.getElementById("filtroPrecio").value;

let lista=productos.filter(p=>{
let okTexto=p.nombre.toLowerCase().includes(texto);
let okCat = !cat || (p.categoria||"").toLowerCase() === cat.toLowerCase();
return okTexto && okCat;
});

if(precio==="menor"){
lista.sort((a,b)=>(a.unidad||a.pack)-(b.unidad||b.pack));
}
if(precio==="mayor"){
lista.sort((a,b)=>(b.unidad||b.pack)-(a.unidad||a.pack));
}

productosFiltrados=lista;
render();
}
</script>

</body>
</html>
